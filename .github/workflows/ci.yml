name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - uses: azure/setup-helm@v4
      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]
      - name: Run platform tests
        run: python -m pytest -q
      - name: Validate Docker Compose profiles
        run: docker compose -f docker/docker-compose.yml --profile ui --profile edge config --quiet
      - name: Validate Helm chart
        run: |
          helm lint k8s/helm
          helm template ravan k8s/helm --set flinkJob.enabled=true --set flinkJob.operator.enabled=true >/dev/null
      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build
      - name: Validate operator shell manifest
        working-directory: operator-shell
        run: npm install --package-lock=false && cargo check --manifest-path src-tauri/Cargo.toml --locked
