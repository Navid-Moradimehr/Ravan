name: Ravan Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  container-images:
    name: Publish ${{ matrix.name }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: docker/Dockerfile.api
          - name: ai-gateway
            dockerfile: services/ai_gateway/Dockerfile
          - name: processor
            dockerfile: services/processor/Dockerfile
          - name: edge
            dockerfile: services/edge_ingest/Dockerfile
          - name: dashboard
            dockerfile: ui/Dockerfile
          - name: flink-runtime
            dockerfile: docker/Dockerfile.flink-runtime
          - name: flink-job
            dockerfile: docker/Dockerfile.flink-job
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve release identity
        id: version
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/ravan-${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.version.outputs.owner }}/ravan-${{ matrix.name }}:${{ github.ref_name }}

  release-artifacts:
    name: Package and publish release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install packaging dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e .[dev]
      - name: Stage release packages
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          for mode in compose kubernetes linux windows offline operator; do
            python scripts/package-release.py --output-dir "dist/$mode" --archive zip "$mode"
          done
          git archive --format=tar.gz --prefix="ravan-${version}/" -o "dist/ravan-${version}-source.tar.gz" HEAD
      - name: Generate checksums, SBOM, and provenance
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/evidence
          find dist -type f \( -name '*.zip' -o -name '*source.tar.gz' \) -exec cp {} dist/evidence/ \;
          python scripts/generate_release_evidence.py \
            --root . \
            --artifact-dir dist/evidence \
            --output-dir dist/evidence \
            --version "$version"
          sha256sum dist/evidence/* > dist/evidence/all-artifacts.sha256
      - name: Create release manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python - <<'PY'
          import json, os
          from pathlib import Path
          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          artifacts = [
              {"name": path.name, "file": str(path.relative_to("dist"))}
              for path in sorted(Path("dist").rglob("*.zip"))
          ]
          artifacts.append({"name": f"ravan-{version}-source.tar.gz", "file": f"ravan-{version}-source.tar.gz"})
          Path("dist/release-manifest.json").write_text(json.dumps({
              "product": "Ravan",
              "version": version,
              "repository": "https://github.com/Navid-Moradimehr/Ravan",
              "artifacts": artifacts,
              "image_registry": "ghcr.io/navid-moradimehr",
          }, indent=2), encoding="utf-8")
          PY
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/*source.tar.gz
            dist/evidence/*
            dist/release-manifest.json
