name: Release Source Bundle

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  source-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source bundle
        run: |
          git archive --format=tar.gz --prefix=ravan-${GITHUB_REF_NAME#v}/ -o ravan-${GITHUB_REF_NAME#v}-source.tar.gz HEAD
          sha256sum ravan-${GITHUB_REF_NAME#v}-source.tar.gz > ravan-${GITHUB_REF_NAME#v}-source.tar.gz.sha256
      - name: Create release manifest
        run: |
          cat > release-manifest.json <<EOF
          {"product":"Ravan","version":"${GITHUB_REF_NAME#v}","repository":"https://github.com/Navid-Moradimehr/Ravan","artifacts":[{"name":"source","file":"ravan-${GITHUB_REF_NAME#v}-source.tar.gz"}]}
          EOF
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ravan-*-source.tar.gz
            ravan-*-source.tar.gz.sha256
            release-manifest.json
