global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: ai-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: edge-ingest
    metrics_path: /metrics
    static_configs:
      - targets: ["edge-ingest:8090"]

  - job_name: processor
    metrics_path: /metrics
    static_configs:
      - targets: ["processor:8094"]

  - job_name: fanout
    metrics_path: /metrics
    static_configs:
      - targets: ["fanout:8095"]

  - job_name: ai-fanout
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-fanout:8096"]

  - job_name: api-service
    metrics_path: /metrics
    static_configs:
      - targets: ["api-service:8020"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
