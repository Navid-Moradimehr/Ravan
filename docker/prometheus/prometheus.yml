global:
  scrape_interval: 5s

scrape_configs:
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]

  - job_name: ai-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: edge-ingest
    metrics_path: /metrics
    static_configs:
      - targets: ["edge-ingest:8090"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
