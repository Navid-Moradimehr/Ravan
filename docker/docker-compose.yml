name: local-stream-engine

services:
  kafka:
    image: apache/kafka:4.1.2
    command:
      - bash
      - -lc
      - |
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format -t "$(/opt/kafka/bin/kafka-storage.sh random-uuid)" -c /opt/kafka/config/server.properties
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
    ports:
      - "19092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka/server.properties:/opt/kafka/config/server.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
    ports:
      - "18080:8080"

  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:3.0.0.Final
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "18083:8083"

  ai-gateway:
    build:
      context: ..
      dockerfile: services/ai_gateway/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      PROCESSED_TOPIC: iot.processed
      AI_ENRICHED_TOPIC: iot.ai_enriched
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-20B}
      LLM_BATCH_SECONDS: ${LLM_BATCH_SECONDS:-5}
      LLM_MAX_BATCH_SIZE: ${LLM_MAX_BATCH_SIZE:-100}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_ALLOW_FALLBACK: ${LLM_ALLOW_FALLBACK:-true}
    ports:
      - "8080:8080"

  processor:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: iot.raw
      PROCESSED_TOPIC: iot.processed
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized

  fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.normalized_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      FANOUT_GROUP_ID: normalized-fanout
      SINKS: ${FANOUT_SINKS:-historian}

  ai-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.ai_enriched_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      AI_ENRICHED_TOPIC: iot.ai_enriched
      AI_ENRICHED_FANOUT_GROUP_ID: ai-enriched-fanout

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "1883:1883"
    profiles:
      - edge

  mqtt-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.mqtt_publisher"]
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_RATE_PER_SECOND: ${MQTT_RATE_PER_SECOND:-25}
    profiles:
      - edge

  opcua-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.opcua_simulator"]
    ports:
      - "14840:4840"
    profiles:
      - edge

  modbus-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.modbus_simulator"]
    ports:
      - "15020:5020"
    profiles:
      - edge

  edge-ingest:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      opcua-sim:
        condition: service_started
      modbus-sim:
        condition: service_started
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      EDGE_PROTOCOLS: ${EDGE_PROTOCOLS:-mqtt,opcua,modbus}
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      OPCUA_ENDPOINT: opc.tcp://opcua-sim:4840/freeopcua/server/
      MODBUS_HOST: modbus-sim
      MODBUS_PORT: 5020
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_RETAINED: ${MQTT_RETAINED:-true}
      MQTT_WILL_TOPIC: ${MQTT_WILL_TOPIC:-factory/edge-ingest/status}
      MQTT_WILL_PAYLOAD: ${MQTT_WILL_PAYLOAD:-{"status":"offline"}}
      MQTT_WILL_QOS: ${MQTT_WILL_QOS:-1}
      MQTT_WILL_RETAIN: ${MQTT_WILL_RETAIN:-false}
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      INDUSTRIAL_DLQ_TOPIC: industrial.dlq
      IOT_TOPIC: iot.raw
    ports:
      - "8090:8090"
    profiles:
      - edge

  dashboard:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    depends_on:
      - ai-gateway
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      PROMETHEUS_BASE_URL: http://prometheus:9090
      GRAFANA_BASE_URL: http://grafana:3000
    ports:
      - "3006:3006"
    profiles:
      - ui

  jobmanager:
    image: flink:1.20.0-scala_2.12-java17
    command: jobmanager
    ports:
      - "18088:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    volumes:
      - ../services/processor:/opt/processor:ro

  taskmanager:
    image: flink:1.20.0-scala_2.12-java17
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ../services/processor:/opt/processor:ro

  flink-job:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink-job
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: iot.raw
      PROCESSED_TOPIC: iot.processed
      FLINK_PARALLELISM: ${FLINK_PARALLELISM:-4}
      FLINK_CHECKPOINT_INTERVAL_MS: ${FLINK_CHECKPOINT_INTERVAL_MS:-10000}

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - extended


  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./postgres/init-timescale-full.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10


  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - cache

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: stream_engine
      TIMESCALE_USER: stream
      TIMESCALE_PASSWORD: stream
      API_SERVICE_PORT: 8020
    ports:
      - "8020:8020"
    profiles:
      - api

volumes:
  kafka-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  minio-data:
  timescale-data:
  redis-data:
