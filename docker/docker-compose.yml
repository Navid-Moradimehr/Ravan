name: local-stream-engine

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr
      - internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr
      - internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr
      - internal://0.0.0.0:8081,external://0.0.0.0:18081
    ports:
      - "18081:18081"
      - "18082:18082"
      - "19092:19092"
      - "19644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.1
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: redpanda:9092
      SCHEMAREGISTRY_ENABLED: "true"
      SCHEMAREGISTRY_URLS: http://redpanda:8081
      REDPANDA_ADMINAPI_ENABLED: "true"
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "18080:8080"

  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:3.0.0.Final
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: redpanda:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "18083:8083"

  ai-gateway:
    build:
      context: ..
      dockerfile: services/ai_gateway/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda:9092
      PROCESSED_TOPIC: iot.processed
      AI_ENRICHED_TOPIC: iot.ai_enriched
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-20B}
      LLM_BATCH_SECONDS: ${LLM_BATCH_SECONDS:-5}
      LLM_MAX_BATCH_SIZE: ${LLM_MAX_BATCH_SIZE:-100}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_ALLOW_FALLBACK: ${LLM_ALLOW_FALLBACK:-true}
    ports:
      - "8080:8080"

  processor:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      REDPANDA_BROKERS: redpanda:9092
      IOT_TOPIC: iot.raw
      PROCESSED_TOPIC: iot.processed

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "1883:1883"
    profiles:
      - edge

  mqtt-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.mqtt_publisher"]
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_RATE_PER_SECOND: ${MQTT_RATE_PER_SECOND:-25}
    profiles:
      - edge

  opcua-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.opcua_simulator"]
    ports:
      - "14840:4840"
    profiles:
      - edge

  modbus-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.modbus_simulator"]
    ports:
      - "15020:5020"
    profiles:
      - edge

  edge-ingest:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      opcua-sim:
        condition: service_started
      modbus-sim:
        condition: service_started
    environment:
      REDPANDA_BROKERS: redpanda:9092
      EDGE_PROTOCOLS: ${EDGE_PROTOCOLS:-mqtt,opcua,modbus}
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      OPCUA_ENDPOINT: opc.tcp://opcua-sim:4840/freeopcua/server/
      MODBUS_HOST: modbus-sim
      MODBUS_PORT: 5020
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      INDUSTRIAL_DLQ_TOPIC: industrial.dlq
      IOT_TOPIC: iot.raw
    ports:
      - "8090:8090"
    profiles:
      - edge

  dashboard:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    depends_on:
      - ai-gateway
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      PROMETHEUS_BASE_URL: http://prometheus:9090
      GRAFANA_BASE_URL: http://grafana:3000
    ports:
      - "3000:3000"
    profiles:
      - ui

  jobmanager:
    image: flink:1.20.0-scala_2.12-java17
    command: jobmanager
    ports:
      - "18088:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    volumes:
      - ../services/processor:/opt/processor:ro

  taskmanager:
    image: flink:1.20.0-scala_2.12-java17
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ../services/processor:/opt/processor:ro

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    ports:
      - "13000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - extended


  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./postgres/init-timescale.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  redpanda-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  minio-data:
  timescale-data:

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: stream_engine
      TIMESCALE_USER: stream
      TIMESCALE_PASSWORD: stream
      API_SERVICE_PORT: 8020
    ports:
      - "8020:8020"
    profiles:
      - api
