name: local-stream-engine

services:
  kafka:
    image: apache/kafka:4.1.2
    command:
      - bash
      - -lc
      - |
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format -t "$(/opt/kafka/bin/kafka-storage.sh random-uuid)" -c /opt/kafka/config/server.properties
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
    ports:
      - "19092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka/server.properties:/opt/kafka/config/server.properties:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -lc
      - |
        set -e
        for topic in industrial.raw industrial.normalized industrial.operational industrial.dlq iot.raw iot.processed iot.ai_enriched; do
          /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
            --topic "$$topic" \
            --bootstrap-server kafka:9092 \
            --partitions 3 \
            --replication-factor 1 || true
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "true"
    ports:
      - "18080:8080"

  kafka-federation:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CENTRAL_KAFKA_BROKERS: ${CENTRAL_KAFKA_BROKERS:-central-kafka:9092}
      FEDERATION_TOPICS: ${FEDERATION_TOPICS:-industrial.normalized,industrial.operational}
    entrypoint: ["bash", "-lc"]
    command:
      - >-
        sed -e "s|__CENTRAL_KAFKA_BROKERS__|$${CENTRAL_KAFKA_BROKERS}|g"
        -e "s|__FEDERATION_TOPICS__|$${FEDERATION_TOPICS}|g"
        /etc/kafka/mm2.properties > /tmp/mm2.properties;
        exec /opt/kafka/bin/connect-mirror-maker.sh /tmp/mm2.properties
    volumes:
      - ../config/federation/mirrormaker2.properties:/etc/kafka/mm2.properties:ro
    profiles:
      - federation

  postgres:
    image: postgres:15-alpine
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:3.0.0.Final
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "18083:8083"

  ai-gateway:
    build:
      context: ..
      dockerfile: services/ai_gateway/Dockerfile
    init: true
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      PROCESSED_TOPIC: iot.processed
      AI_ENRICHED_TOPIC: iot.ai_enriched
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-20B}
      LLM_BATCH_SECONDS: ${LLM_BATCH_SECONDS:-5}
      LLM_MAX_BATCH_SIZE: ${LLM_MAX_BATCH_SIZE:-100}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      LLM_ALLOW_FALLBACK: ${LLM_ALLOW_FALLBACK:-true}
    ports:
      - "8080:8080"

  processor:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: iot.raw
      PROCESSED_TOPIC: iot.processed
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized

  fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.normalized_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      FANOUT_GROUP_ID: normalized-fanout
      SINKS: ${FANOUT_SINKS:-historian}
      DATASTREAM_SINK_ROUTING_PATH: /data/sink-routes.json
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_NAMESPACE:-industrial}
      LAKEHOUSE_TABLE: ${LAKEHOUSE_TABLE:-events}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_NAMESPACE_TEMPLATE: ${LAKEHOUSE_NAMESPACE_TEMPLATE:-industrial}
      LAKEHOUSE_TABLE_TEMPLATE: ${LAKEHOUSE_TABLE_TEMPLATE:-events}
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
      LAKEHOUSE_BATCH_SIZE: ${LAKEHOUSE_BATCH_SIZE:-1024}
    volumes:
      - api-data:/data:ro

  ai-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.ai_enriched_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      AI_ENRICHED_TOPIC: iot.ai_enriched
      AI_ENRICHED_FANOUT_GROUP_ID: ai-enriched-fanout
      DATASTREAM_SINK_ROUTING_PATH: /data/sink-routes.json
    volumes:
      - api-data:/data:ro

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "1883:1883"
    profiles:
      - edge

  mqtt-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.mqtt_publisher"]
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_RATE_PER_SECOND: ${MQTT_RATE_PER_SECOND:-25}
      SIM_METRICS_PORT: 8091
    ports:
      - "18091:8091"
    profiles:
      - edge

  opcua-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.opcua_simulator"]
    ports:
      - "14840:4840"
      - "18092:8092"
    environment:
      SIM_METRICS_PORT: 8092
    profiles:
      - edge

  modbus-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.modbus_simulator"]
    ports:
      - "15020:5020"
      - "18093:8093"
    environment:
      SIM_METRICS_PORT: 8093
    profiles:
      - edge

  edge-ingest:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      opcua-sim:
        condition: service_started
      modbus-sim:
        condition: service_started
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      EDGE_PROTOCOLS: ${EDGE_PROTOCOLS:-mqtt,opcua,modbus}
      EDGE_STORE_FORWARD_DIR: /var/lib/datastream/edge-buffer
      EDGE_SOURCE_HEALTH_HISTORY_PATH: /var/lib/datastream/source-health.json
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      OPCUA_ENDPOINT: opc.tcp://opcua-sim:4840/freeopcua/server/
      MODBUS_HOST: modbus-sim
      MODBUS_PORT: 5020
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_RETAINED: ${MQTT_RETAINED:-true}
      MQTT_WILL_TOPIC: ${MQTT_WILL_TOPIC:-factory/edge-ingest/status}
      MQTT_WILL_PAYLOAD: ${MQTT_WILL_PAYLOAD:-{"status":"offline"}}
      MQTT_WILL_QOS: ${MQTT_WILL_QOS:-1}
      MQTT_WILL_RETAIN: ${MQTT_WILL_RETAIN:-false}
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      INDUSTRIAL_DLQ_TOPIC: industrial.dlq
      IOT_TOPIC: iot.raw
    ports:
      - "8090:8090"
    volumes:
      - api-data:/data:ro
      - edge-data:/var/lib/datastream
    profiles:
      - edge

  dashboard:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    init: true
    depends_on:
      ai-gateway:
        condition: service_started
      api-service:
        condition: service_started
    environment:
      API_SERVICE_BASE: http://api-service:8020
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      PROMETHEUS_BASE_URL: http://prometheus:9090
      GRAFANA_BASE_URL: http://grafana:3000
    ports:
      - "3006:3006"
    profiles:
      - ui

  jobmanager:
    image: flink:1.20.0-scala_2.12-java17
    command: jobmanager
    ports:
      - "18088:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    volumes:
      - ../services/processor:/opt/processor:ro

  taskmanager:
    image: flink:1.20.0-scala_2.12-java17
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
    volumes:
      - ../services/processor:/opt/processor:ro

  flink-job:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink-job
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: iot.raw
      PROCESSED_TOPIC: iot.processed
      FLINK_PARALLELISM: ${FLINK_PARALLELISM:-4}
      FLINK_CHECKPOINT_INTERVAL_MS: ${FLINK_CHECKPOINT_INTERVAL_MS:-10000}

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_ROOT_URL: http://localhost:13000/
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "true"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  grafana-proxy:
    image: nginx:1.27-alpine
    depends_on:
      - grafana
    ports:
      - "13000:80"
    volumes:
      - ./grafana/nginx.conf:/etc/nginx/nginx.conf:ro

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - extended
      - raw-archive

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done;
        mc mb --ignore-existing local/$${LAKEHOUSE_BUCKET};
        mc anonymous set private local/$${LAKEHOUSE_BUCKET};
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET:-lakehouse}
    profiles:
      - extended
      - raw-archive

  operational-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.operational_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_OPERATIONAL_TOPIC: industrial.operational
      OPERATIONAL_SINKS: ${OPERATIONAL_SINKS:-lakehouse}
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_NAMESPACE:-industrial}
      LAKEHOUSE_TABLE: ${LAKEHOUSE_OPERATIONAL_TABLE:-operational_events}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_NAMESPACE_TEMPLATE: ${LAKEHOUSE_NAMESPACE_TEMPLATE:-industrial}
      LAKEHOUSE_TABLE_TEMPLATE: ${LAKEHOUSE_OPERATIONAL_TABLE_TEMPLATE:-operational_events}
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
    profiles:
      - extended

  raw-lakehouse-archive:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.raw_lakehouse_archive"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_RAW_NAMESPACE:-industrial_raw}
      LAKEHOUSE_RAW_TABLE: ${LAKEHOUSE_RAW_TABLE:-raw_events}
      LAKEHOUSE_RAW_TABLE_TEMPLATE: ${LAKEHOUSE_RAW_TABLE_TEMPLATE:-raw_events}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
      RAW_ARCHIVE_MAX_BYTES: ${RAW_ARCHIVE_MAX_BYTES:-1048576}
      RAW_ARCHIVE_REDACT_FIELDS: ${RAW_ARCHIVE_REDACT_FIELDS:-}
      RAW_ARCHIVE_DLQ_TOPIC: ${RAW_ARCHIVE_DLQ_TOPIC:-industrial.raw.archive.dlq}
    profiles:
      - raw-archive


  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./docker/postgres/init-timescale-full.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  timescaledb-migrate:
    image: timescale/timescaledb:latest-pg15
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: stream
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >-
        set -e; export PGPASSWORD=stream;
        until psql -h timescaledb -U stream -d stream_engine -c "SELECT 1" >/dev/null 2>&1;
        do sleep 1; done;
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1
        -c "SET timescaledb.max_tuples_decompressed_per_dml_transaction = 0;"
        -c "DELETE FROM industrial_events a USING industrial_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;"
        -c "DELETE FROM processed_events a USING processed_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;"
        -c "DELETE FROM dead_letter_events a USING dead_letter_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;" ;
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1
        -c "CREATE UNIQUE INDEX IF NOT EXISTS industrial_events_event_id_uniq ON industrial_events (time, event_id);"
        -c "CREATE UNIQUE INDEX IF NOT EXISTS processed_events_event_id_uniq ON processed_events (time, event_id);"
        -c "CREATE UNIQUE INDEX IF NOT EXISTS dead_letter_events_event_id_uniq ON dead_letter_events (time, event_id);"


  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - cache

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: stream_engine
      TIMESCALE_USER: stream
      TIMESCALE_PASSWORD: stream
      API_SERVICE_PORT: 8020
      DATASTREAM_AI_BASE: http://ai-gateway:8080
      DATASTREAM_CONNECTION_REGISTRY_PATH: /data/connection-registry.json
      DATASTREAM_WEBHOOK_REGISTRY_PATH: /data/webhooks.json
      DATASTREAM_NOTIFICATION_REGISTRY_PATH: /data/notifications.json
      DATASTREAM_DELIVERY_LEDGER_PATH: /data/delivery-ledger.json
      EDGE_SOURCE_HEALTH_HISTORY_PATH: /var/lib/datastream/source-health.json
    ports:
      - "8020:8020"
    volumes:
      - api-data:/data
      - edge-data:/var/lib/datastream:ro
    profiles:
      - api
      - ui

volumes:
  kafka-data:
  postgres-data:
  prometheus-data:
  grafana-data:
  minio-data:
  timescale-data:
  redis-data:
  api-data:
  edge-data:
