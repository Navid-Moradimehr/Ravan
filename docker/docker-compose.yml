name: local-stream-engine

services:
  kafka:
    image: apache/kafka:4.1.2
    restart: unless-stopped
    command:
      - bash
      - -lc
      - |
        if [ ! -f /var/lib/kafka/data/meta.properties ]; then
          /opt/kafka/bin/kafka-storage.sh format -t "$(/opt/kafka/bin/kafka-storage.sh random-uuid)" -c /opt/kafka/config/server.properties
        fi
        exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/server.properties
    ports:
      - "19092:29092"
      - "19097:9997"
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./kafka/server.properties:/opt/kafka/config/server.properties:ro
    environment:
      KAFKA_JMX_PORT: 9997
      KAFKA_JMX_OPTS: >-
        -Dcom.sun.management.jmxremote
        -Dcom.sun.management.jmxremote.authenticate=false
        -Dcom.sun.management.jmxremote.ssl=false
        -Djava.rmi.server.hostname=kafka
        -Dcom.sun.management.jmxremote.rmi.port=9997
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-init:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command:
      - bash
      - -lc
      - |
        set -e
        for topic in industrial.raw industrial.normalized industrial.operational industrial.observation-artifacts industrial.dlq iot.raw iot.processed iot.ai_enriched platform.metadata.threshold-policies; do
          /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
            --topic "$$topic" \
            --bootstrap-server kafka:9092 \
            --partitions 3 \
            --replication-factor 1 \
            --config cleanup.policy=compact || true
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui@sha256:7cda86a33344160309fdb65146332e4da65db81a945614f2fe32e210803f6fd1
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "true"
      KAFKA_CLUSTERS_0_METRICS_TYPE: JMX
      KAFKA_CLUSTERS_0_METRICS_PORT: 9997
    ports:
      - "18080:8080"

  kafka-federation:
    image: apache/kafka:4.1.2
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CENTRAL_KAFKA_BROKERS: ${CENTRAL_KAFKA_BROKERS:-central-kafka:9092}
      FEDERATION_TOPICS: ${FEDERATION_TOPICS:-industrial.normalized,industrial.operational}
    entrypoint: ["bash", "-lc"]
    command:
      - >-
        sed -e "s|__CENTRAL_KAFKA_BROKERS__|$${CENTRAL_KAFKA_BROKERS}|g"
        -e "s|__FEDERATION_TOPICS__|$${FEDERATION_TOPICS}|g"
        /etc/kafka/mm2.properties > /tmp/mm2.properties;
        exec /opt/kafka/bin/connect-mirror-maker.sh /tmp/mm2.properties
    volumes:
      - ../config/federation/mirrormaker2.properties:/etc/kafka/mm2.properties:ro
    profiles:
      - federation

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  connect:
    image: debezium/connect:3.0.0.Final
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    ports:
      - "18083:8083"

  ai-gateway:
    build:
      context: ..
      dockerfile: services/ai_gateway/Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      PROCESSED_TOPIC: iot.processed
      AI_ENRICHED_TOPIC: iot.ai_enriched
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:1234/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-lm-studio}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-oss-20B}
      LLM_BATCH_SECONDS: ${LLM_BATCH_SECONDS:-5}
      LLM_MAX_BATCH_SIZE: ${LLM_MAX_BATCH_SIZE:-100}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-8}
      AI_REPORT_QUEUE_SIZE: ${AI_REPORT_QUEUE_SIZE:-16}
      AI_REPORT_MAX_IN_FLIGHT: ${AI_REPORT_MAX_IN_FLIGHT:-1}
      LLM_ALLOW_FALLBACK: ${LLM_ALLOW_FALLBACK:-true}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3)\" >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  processor:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: ${IOT_TOPIC:-industrial.normalized}
      PROCESSED_TOPIC: iot.processed
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      PROCESSOR_METRICS_PORT: 8094
    ports:
      - "18094:8094"
    profiles:
      - python-fallback

  fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.normalized_fanout"]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      FANOUT_GROUP_ID: normalized-fanout
      SINKS: ${FANOUT_SINKS:-historian}
      DATASTREAM_SINK_ROUTING_PATH: /data/sink-routes.json
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_NAMESPACE:-industrial}
      LAKEHOUSE_TABLE: ${LAKEHOUSE_TABLE:-events}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_NAMESPACE_TEMPLATE: ${LAKEHOUSE_NAMESPACE_TEMPLATE:-industrial}
      LAKEHOUSE_TABLE_TEMPLATE: ${LAKEHOUSE_TABLE_TEMPLATE:-events}
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
      LAKEHOUSE_BATCH_SIZE: ${LAKEHOUSE_BATCH_SIZE:-1024}
      FANOUT_METRICS_PORT: 8095
    ports:
      - "18095:8095"
    volumes:
      - api-data:/data:ro

  processed-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.processed_fanout"]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      PROCESSED_TOPIC: iot.processed
      PROCESSED_FANOUT_GROUP_ID: processed-historian
      PROCESSED_FANOUT_METRICS_PORT: 8097
    ports:
      - "18097:8097"
    volumes:
      - api-data:/data:ro

  ai-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.ai_enriched_fanout"]
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      timescaledb-migrate:
        condition: service_completed_successfully
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      AI_ENRICHED_TOPIC: iot.ai_enriched
      AI_ENRICHED_FANOUT_GROUP_ID: ai-enriched-fanout
      DATASTREAM_SINK_ROUTING_PATH: /data/sink-routes.json
      AI_FANOUT_METRICS_PORT: 8096
    ports:
      - "18096:8096"
    volumes:
      - api-data:/data:ro

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    command: mosquitto -c /mosquitto-no-auth.conf
    ports:
      - "1883:1883"
    profiles:
      - edge

  mqtt-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.mqtt_publisher"]
    depends_on:
      - mqtt-broker
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      MQTT_RATE_PER_SECOND: ${MQTT_RATE_PER_SECOND:-25}
      SIM_METRICS_PORT: 8091
    ports:
      - "18091:8091"
    profiles:
      - edge

  opcua-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.opcua_simulator"]
    ports:
      - "14840:4840"
      - "18092:8092"
    environment:
      SIM_METRICS_PORT: 8092
    profiles:
      - edge

  modbus-sim:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    command: ["python", "-m", "services.edge_ingest.modbus_simulator"]
    ports:
      - "15020:5020"
      - "18093:8093"
    environment:
      SIM_METRICS_PORT: 8093
    profiles:
      - edge

  edge-ingest:
    build:
      context: ..
      dockerfile: services/edge_ingest/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
      opcua-sim:
        condition: service_started
      modbus-sim:
        condition: service_started
    environment:
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      KAFKA_BROKERS: kafka:9092
      EDGE_PROTOCOLS: ${EDGE_PROTOCOLS:-mqtt,opcua,modbus}
      EDGE_STORE_FORWARD_DIR: /var/lib/datastream/edge-buffer
      EDGE_SOURCE_HEALTH_HISTORY_PATH: /var/lib/datastream/source-health.json
      DATASTREAM_CONNECTION_REGISTRY_PATH: /data/connection-registry.json
      MQTT_HOST: mqtt-broker
      MQTT_PORT: 1883
      OPCUA_ENDPOINT: opc.tcp://opcua-sim:4840/freeopcua/server/
      MODBUS_HOST: modbus-sim
      MODBUS_PORT: 5020
      MQTT_QOS: ${MQTT_QOS:-1}
      MQTT_RETAINED: ${MQTT_RETAINED:-true}
      MQTT_WILL_TOPIC: ${MQTT_WILL_TOPIC:-factory/edge-ingest/status}
      MQTT_WILL_PAYLOAD: ${MQTT_WILL_PAYLOAD:-{"status":"offline"}}
      MQTT_WILL_QOS: ${MQTT_WILL_QOS:-1}
      MQTT_WILL_RETAIN: ${MQTT_WILL_RETAIN:-false}
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      INDUSTRIAL_NORMALIZED_TOPIC: industrial.normalized
      INDUSTRIAL_DLQ_TOPIC: industrial.dlq
      IOT_TOPIC: ${IOT_TOPIC:-industrial.normalized}
    ports:
      - "8090:8090"
    volumes:
      - api-data:/data:ro
      - edge-data:/var/lib/datastream
    profiles:
      - edge

  dashboard:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      ai-gateway:
        condition: service_healthy
      api-service:
        condition: service_healthy
    environment:
      API_SERVICE_BASE: http://api-service:8020
      NEXT_PUBLIC_API_WS_BASE_URL: ws://localhost:8020
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      PROMETHEUS_BASE_URL: http://prometheus:9090
      GRAFANA_BASE_URL: http://grafana:3000
    ports:
      - "3006:3006"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3006/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    profiles:
      - ui

  flink-checkpoint-init:
    image: flink:1.20.0-scala_2.12-java17
    user: root
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /opt/flink/checkpoints/savepoints && chown -R 9999:9999 /opt/flink/checkpoints"]
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints

  jobmanager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink-runtime
    command: jobmanager
    restart: unless-stopped
    depends_on:
      flink-checkpoint-init:
        condition: service_completed_successfully
    ports:
      - "18088:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
    volumes:
      - ../services/processor:/opt/processor:ro
      - flink-checkpoints:/opt/flink/checkpoints

  taskmanager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink-runtime
    depends_on:
      - jobmanager
      - flink-checkpoint-init
    command: taskmanager
    restart: unless-stopped
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASKMANAGER_SLOTS:-2}
    volumes:
      - ../services/processor:/opt/processor:ro
      - flink-checkpoints:/opt/flink/checkpoints

  flink-job:
    build:
      context: ..
      dockerfile: docker/Dockerfile.flink-job
    depends_on:
      - jobmanager
      - taskmanager
      - kafka
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      IOT_TOPIC: ${IOT_TOPIC:-industrial.normalized}
      PROCESSED_TOPIC: iot.processed
      RUNTIME_MODE: flink-production
      # Compose starts one TaskManager by default. Operators can use the
      # capacity planner and `docker compose --scale taskmanager=N` after
      # provisioning enough local resources.
      FLINK_PARALLELISM: ${FLINK_PARALLELISM:-1}
      FLINK_MAX_PARALLELISM: ${FLINK_MAX_PARALLELISM:-3}
      FLINK_CHECKPOINT_INTERVAL_MS: ${FLINK_CHECKPOINT_INTERVAL_MS:-10000}
      FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-file:///opt/flink/checkpoints}
      FLINK_SAVEPOINT_DIR: ${FLINK_SAVEPOINT_DIR:-file:///opt/flink/checkpoints/savepoints}

  prometheus:
    image: prom/prometheus:v3.0.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "19090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.4.0
    depends_on:
      - prometheus
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_ROOT_URL: http://localhost:13000/
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "true"
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  grafana-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - grafana
    ports:
      - "13000:80"
    volumes:
      - ./grafana/nginx.conf:/etc/nginx/nginx.conf:ro

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio-data:/data
    profiles:
      - extended
      - raw-archive

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 1; done;
        mc mb --ignore-existing local/$${LAKEHOUSE_BUCKET};
        mc anonymous set private local/$${LAKEHOUSE_BUCKET};
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio12345}
      LAKEHOUSE_BUCKET: ${LAKEHOUSE_BUCKET:-lakehouse}
    profiles:
      - extended
      - raw-archive

  operational-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.operational_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_OPERATIONAL_TOPIC: industrial.operational
      OPERATIONAL_SINKS: ${OPERATIONAL_SINKS:-lakehouse}
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_NAMESPACE:-industrial}
      LAKEHOUSE_TABLE: ${LAKEHOUSE_OPERATIONAL_TABLE:-operational_events_v2}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_NAMESPACE_TEMPLATE: ${LAKEHOUSE_NAMESPACE_TEMPLATE:-industrial}
      LAKEHOUSE_TABLE_TEMPLATE: ${LAKEHOUSE_OPERATIONAL_TABLE_TEMPLATE:-operational_events_v2}
      LAKEHOUSE_EVENT_FAMILY: operational
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
    profiles:
      - extended

  artifact-fanout:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.artifact_fanout"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_ARTIFACT_TOPIC: industrial.observation-artifacts
      ARTIFACT_SINKS: ${ARTIFACT_SINKS:-lakehouse}
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_NAMESPACE:-industrial}
      LAKEHOUSE_TABLE: ${LAKEHOUSE_ARTIFACT_TABLE:-observation_artifacts}
      LAKEHOUSE_TABLE_TEMPLATE: ${LAKEHOUSE_ARTIFACT_TABLE_TEMPLATE:-observation_artifacts}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_EVENT_FAMILY: artifact
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
    profiles:
      - extended

  dataset-worker:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.datasets.dataset_worker"]
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://stream:stream@timescaledb:5432/stream_engine
      DATASET_WORKER_ID: ${DATASET_WORKER_ID:-dataset-worker-1}
      DATASET_WORKER_POLL_SECONDS: ${DATASET_WORKER_POLL_SECONDS:-5}
    profiles:
      - world-model

  raw-lakehouse-archive:
    build:
      context: ..
      dockerfile: services/processor/Dockerfile
    command: ["python", "-m", "services.processor.raw_lakehouse_archive"]
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:9092
      INDUSTRIAL_RAW_TOPIC: industrial.raw
      LAKEHOUSE_CATALOG: ${LAKEHOUSE_CATALOG:-sql}
      LAKEHOUSE_CATALOG_URI: ${LAKEHOUSE_CATALOG_URI:-postgresql+psycopg2://stream:stream@timescaledb:5432/stream_engine}
      LAKEHOUSE_NAMESPACE: ${LAKEHOUSE_RAW_NAMESPACE:-industrial_raw}
      LAKEHOUSE_RAW_TABLE: ${LAKEHOUSE_RAW_TABLE:-raw_events}
      LAKEHOUSE_RAW_TABLE_TEMPLATE: ${LAKEHOUSE_RAW_TABLE_TEMPLATE:-raw_events}
      LAKEHOUSE_LAYOUT: ${LAKEHOUSE_LAYOUT:-single-table}
      LAKEHOUSE_WAREHOUSE: ${LAKEHOUSE_WAREHOUSE:-s3://lakehouse/}
      LAKEHOUSE_S3_ENDPOINT: ${LAKEHOUSE_S3_ENDPOINT:-http://minio:9000}
      LAKEHOUSE_S3_ACCESS_KEY: ${LAKEHOUSE_S3_ACCESS_KEY:-minio}
      LAKEHOUSE_S3_SECRET_KEY: ${LAKEHOUSE_S3_SECRET_KEY:-minio12345}
      LAKEHOUSE_S3_REGION: ${LAKEHOUSE_S3_REGION:-us-east-1}
      RAW_ARCHIVE_MAX_BYTES: ${RAW_ARCHIVE_MAX_BYTES:-1048576}
      RAW_ARCHIVE_REDACT_FIELDS: ${RAW_ARCHIVE_REDACT_FIELDS:-}
      RAW_ARCHIVE_DLQ_TOPIC: ${RAW_ARCHIVE_DLQ_TOPIC:-industrial.raw.archive.dlq}
    profiles:
      - raw-archive


  timescaledb:
    image: timescale/timescaledb@sha256:d621009854b8519a1bf63f81eebc979c1acc06a16843086f244edd44dcce6eea
    restart: unless-stopped
    environment:
      POSTGRES_DB: stream_engine
      POSTGRES_USER: stream
      POSTGRES_PASSWORD: stream
    ports:
      - "15433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./postgres/init-timescale-full.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stream -d stream_engine"]
      interval: 10s
      timeout: 5s
      retries: 10

  timescaledb-migrate:
    image: timescale/timescaledb@sha256:d621009854b8519a1bf63f81eebc979c1acc06a16843086f244edd44dcce6eea
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: stream
      RUN_HISTORIAN_DEDUPE: ${RUN_HISTORIAN_DEDUPE:-false}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - >-
        set -e; export PGPASSWORD=stream;
        until psql -h timescaledb -U stream -d stream_engine -c "SELECT 1" >/dev/null 2>&1;
        do sleep 1; done;
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1
        -c "CREATE TABLE IF NOT EXISTS metadata_schema_migrations (migration_id TEXT PRIMARY KEY, applied_at TIMESTAMPTZ NOT NULL DEFAULT now());";
        if [ "$${RUN_HISTORIAN_DEDUPE:-false}" = "true" ] && [ "$(psql -h timescaledb -U stream -d stream_engine -tAc "SELECT 1 FROM metadata_schema_migrations WHERE migration_id = '2026-07-historian-dedupe'")" != "1" ]; then
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1
        -c "SET timescaledb.max_tuples_decompressed_per_dml_transaction = 0;"
        -c "DELETE FROM industrial_events a USING industrial_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;"
        -c "DELETE FROM processed_events a USING processed_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;"
        -c "DELETE FROM dead_letter_events a USING dead_letter_events b WHERE a.ctid < b.ctid AND a.event_id = b.event_id;" ;
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1 -c "INSERT INTO metadata_schema_migrations (migration_id) VALUES ('2026-07-historian-dedupe') ON CONFLICT (migration_id) DO NOTHING;";
        fi;
        psql -h timescaledb -U stream -d stream_engine -v ON_ERROR_STOP=1
        -c "CREATE UNIQUE INDEX IF NOT EXISTS industrial_events_event_id_uniq ON industrial_events (time, event_id);"
        -c "CREATE UNIQUE INDEX IF NOT EXISTS processed_events_event_id_uniq ON processed_events (time, event_id);"
        -c "CREATE UNIQUE INDEX IF NOT EXISTS dead_letter_events_event_id_uniq ON dead_letter_events (time, event_id);"
        -c "CREATE TABLE IF NOT EXISTS metadata_asset_tags (site_id TEXT NOT NULL, asset_id TEXT NOT NULL, tag TEXT NOT NULL, unit TEXT, source TEXT NOT NULL DEFAULT 'observed', first_seen TIMESTAMPTZ, last_seen TIMESTAMPTZ, active BOOLEAN NOT NULL DEFAULT TRUE, updated_at TIMESTAMPTZ NOT NULL DEFAULT now(), PRIMARY KEY (site_id, asset_id, tag));"
        -c "CREATE INDEX IF NOT EXISTS metadata_asset_tags_lookup_idx ON metadata_asset_tags (site_id, asset_id, tag);"
        -c "CREATE INDEX IF NOT EXISTS metadata_asset_tags_updated_idx ON metadata_asset_tags (updated_at DESC);"
        -c "CREATE TABLE IF NOT EXISTS audit_logs (time TIMESTAMPTZ NOT NULL DEFAULT now(), user_id TEXT NOT NULL DEFAULT '', action TEXT NOT NULL, resource TEXT NOT NULL DEFAULT '', details JSONB NOT NULL DEFAULT '{}'::jsonb);"
        -c "CREATE INDEX IF NOT EXISTS audit_logs_time_idx ON audit_logs (time DESC);"
        -c "CREATE INDEX IF NOT EXISTS audit_logs_resource_idx ON audit_logs (resource, time DESC);"
        -c "CREATE TABLE IF NOT EXISTS metadata_threshold_policies (site_id TEXT NOT NULL, asset_id TEXT NOT NULL, tag TEXT NOT NULL, unit TEXT, mode TEXT NOT NULL DEFAULT 'outside_range', warning_low DOUBLE PRECISION, warning_high DOUBLE PRECISION, critical_low DOUBLE PRECISION, critical_high DOUBLE PRECISION, deadband DOUBLE PRECISION NOT NULL DEFAULT 0, on_delay_seconds DOUBLE PRECISION NOT NULL DEFAULT 0, off_delay_seconds DOUBLE PRECISION NOT NULL DEFAULT 0, enabled BOOLEAN NOT NULL DEFAULT TRUE, source TEXT NOT NULL DEFAULT 'user', version INTEGER NOT NULL DEFAULT 1, effective_from TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now(), PRIMARY KEY (site_id, asset_id, tag));"
        -c "CREATE INDEX IF NOT EXISTS metadata_threshold_policies_site_idx ON metadata_threshold_policies (site_id, asset_id, tag);"
        -c "CREATE TABLE IF NOT EXISTS metadata_threshold_policy_outbox (outbox_id BIGSERIAL PRIMARY KEY, policy_key TEXT NOT NULL, site_id TEXT NOT NULL, asset_id TEXT NOT NULL, tag TEXT NOT NULL, policy_version INTEGER NOT NULL, payload JSONB NOT NULL, sync_status TEXT NOT NULL DEFAULT 'pending', attempts INTEGER NOT NULL DEFAULT 0, last_error TEXT, created_at TIMESTAMPTZ NOT NULL DEFAULT now(), updated_at TIMESTAMPTZ NOT NULL DEFAULT now(), published_at TIMESTAMPTZ);"
        -c "CREATE INDEX IF NOT EXISTS metadata_threshold_policy_outbox_status_idx ON metadata_threshold_policy_outbox (sync_status, outbox_id);"
        -c "CREATE INDEX IF NOT EXISTS metadata_threshold_policy_outbox_policy_idx ON metadata_threshold_policy_outbox (policy_key, policy_version);"
        -c "ALTER TABLE processed_events ADD COLUMN IF NOT EXISTS threshold_severity TEXT NOT NULL DEFAULT 'normal';"
        -c "ALTER TABLE processed_events ADD COLUMN IF NOT EXISTS threshold_status TEXT NOT NULL DEFAULT 'unconfigured';"
        -c "ALTER TABLE processed_events ADD COLUMN IF NOT EXISTS threshold_source TEXT NOT NULL DEFAULT 'unconfigured';"
        -c "ALTER TABLE processed_events ADD COLUMN IF NOT EXISTS threshold_policy_version INTEGER NOT NULL DEFAULT 0;"
        -c "ALTER TABLE processed_events ADD COLUMN IF NOT EXISTS threshold_breached BOOLEAN NOT NULL DEFAULT FALSE;"
        -c "ALTER TABLE industrial_events ADD COLUMN IF NOT EXISTS value_text TEXT;"
        -c "ALTER TABLE industrial_events ADD COLUMN IF NOT EXISTS value_text_raw TEXT;"
        -c "ALTER TABLE industrial_events ADD COLUMN IF NOT EXISTS value_bool BOOLEAN;"
        -c "ALTER TABLE industrial_events ADD COLUMN IF NOT EXISTS value_type TEXT NOT NULL DEFAULT 'number';"


  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - cache

  api-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      TIMESCALE_HOST: timescaledb
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: stream_engine
      TIMESCALE_USER: stream
      TIMESCALE_PASSWORD: stream
      API_SERVICE_PORT: 8020
      DATASTREAM_AI_BASE: http://ai-gateway:8080
      DATASTREAM_CONNECTION_REGISTRY_PATH: /data/connection-registry.json
      DATASTREAM_WEBHOOK_REGISTRY_PATH: /data/webhooks.json
      DATASTREAM_NOTIFICATION_REGISTRY_PATH: /data/notifications.json
      DATASTREAM_DELIVERY_LEDGER_PATH: /data/delivery-ledger.json
      MODEL_REGISTRY_PATH: /data/model-registry.json
      MODEL_LIFECYCLE_PATH: /data/model-lifecycle.json
      AGENT_ACTION_LEDGER_PATH: /data/agent-actions.json
      PROMPT_REGISTRY_PATH: /data/prompt-registry.json
      SCHEMA_REGISTRY_PATH: /data/schema-registry.json
      DATASET_CATALOG_PATH: /data/dataset-catalog.json
      EDGE_SOURCE_HEALTH_HISTORY_PATH: /var/lib/datastream/source-health.json
    ports:
      - "8020:8020"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8020/health', timeout=3)\" >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
    volumes:
      - api-data:/data
      - edge-data:/var/lib/datastream:ro
    profiles:
      - api
      - ui

volumes:
  kafka-data:
  postgres-data:
  prometheus-data:
  flink-checkpoints:
  grafana-data:
  minio-data:
  timescale-data:
  redis-data:
  api-data:
  edge-data:
