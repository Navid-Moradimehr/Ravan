# Reference configuration for the optional Kafka federation profile.
# Replace placeholders through the Compose environment; do not commit credentials.
clusters = local, central
local.bootstrap.servers = kafka:9092
central.bootstrap.servers = __CENTRAL_KAFKA_BROKERS__

local->central.enabled = true
local->central.topics = __FEDERATION_TOPICS__
local->central.emit.heartbeats = true
local->central.sync.group.offsets.enabled = true
local->central.sync.topic.configs.enabled = false
local->central.sync.topic.acls.enabled = false

replication.factor = 1
offset.storage.replication.factor = 1
status.storage.replication.factor = 1
config.storage.replication.factor = 1
checkpoints.topic.replication.factor = 1
heartbeats.topic.replication.factor = 1
offset-syncs.topic.replication.factor = 1

# Keep site identity visible in the central cluster and avoid collisions with
# a separate site's local topic names.
replication.policy.class = org.apache.kafka.connect.mirror.DefaultReplicationPolicy
replication.policy.separator = .
refresh.topics.interval.seconds = 30
refresh.groups.interval.seconds = 30
