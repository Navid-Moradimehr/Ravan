schema_version: 1
scenario_id: industrial-soak-default
duration_seconds: 900
processor_mode: python-fallback
ai_enabled: false

sources:
  - source_id: opcua-line-01
    protocol: opcua
    site_id: demo-site
    asset_prefix: Pump
    device_count: 3
    rate_per_second: 1
  - source_id: mqtt-line-01
    protocol: mqtt
    site_id: demo-site
    asset_prefix: Pump
    device_count: 8
    rate_per_second: 5
  - source_id: modbus-line-01
    protocol: modbus
    site_id: demo-site
    asset_prefix: Motor
    device_count: 4
    rate_per_second: 1

phases:
  - name: warmup
    duration_seconds: 120
    rate_multiplier: 1
  - name: sustained
    duration_seconds: 360
    rate_multiplier: 1
  - name: burst
    duration_seconds: 120
    rate_multiplier: 10
  - name: reconnect
    duration_seconds: 60
    rate_multiplier: 1
    fault: source_disconnect_reconnect
  - name: restart
    duration_seconds: 60
    rate_multiplier: 1
    fault: processor_restart
    restart_service: processor
  - name: recovery
    duration_seconds: 60
    rate_multiplier: 1
  - name: drain
    duration_seconds: 120
    rate_multiplier: 0

acceptance:
  max_dlq_rate: 0
  max_unaccounted_events: 0
  max_memory_growth_mb: 512
  drain_timeout_seconds: 180
