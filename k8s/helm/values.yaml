# ---------------------------------------------------------------------------
# Data Stream Platform — Helm values
# ---------------------------------------------------------------------------
# Each service can be enabled/disabled independently. Dependencies
# (TimescaleDB, Redpanda) are expected to be installed separately or via
# subcharts.
# ---------------------------------------------------------------------------

image:
  repository: data-stream
  tag: latest
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Service toggles
# ---------------------------------------------------------------------------
apiService:
  enabled: true
  replicaCount: 1
  port: 8020
  targetPort: 8020
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

aiGateway:
  enabled: true
  replicaCount: 1
  port: 8080
  targetPort: 8080
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

processor:
  enabled: true
  replicaCount: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

edgeIngest:
  enabled: true
  replicaCount: 1
  port: 8090
  targetPort: 8090
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Auto-scaling (HPA) — enabled per service for prod profiles
# ---------------------------------------------------------------------------
autoScaling:
  apiService:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  aiGateway:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  processor:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  edgeIngest:
    enabled: false
    minReplicas: 1
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Shared environment (injected into all services via ConfigMap)
# ---------------------------------------------------------------------------
env:
  SITE_ID: "demo-site"
  SITE_NAME: "Demo Site"
  DEPLOYMENT_MODE: "single-site"
  REGION: "local-lab"
  NETWORK_ZONE: "zone-a"
  REDPANDA_BROKERS: "redpanda:9092"
  TIMESCALE_HOST: "timescaledb"
  TIMESCALE_PORT: "5432"
  TIMESCALE_DB: "stream_engine"
  TIMESCALE_USER: "stream"
  API_SERVICE_PORT: "8020"
  AI_GATEWAY_PORT: "8080"
  EDGE_METRICS_PORT: "8090"
  HISTORIAN_AUTO_SETUP: "1"
  HISTORIAN_BACKEND: "timescaledb"
  DATASTREAM_BACKUP_DIR: "backups/demo-site"
  DATASTREAM_BACKUP_SCHEDULE: "daily"
  DATASTREAM_BACKUP_RETENTION_DAYS: "14"
  DATASTREAM_FEDERATION_ENABLED: "false"
  DATASTREAM_FEDERATION_EXPORT_MODE: "none"
  DATASTREAM_CENTRAL_ENDPOINT: ""
  LLM_PROVIDER: "openai_compat"
  LLM_ENDPOINT_URL: "http://host.docker.internal:1234/v1"
  LLM_MODEL_ID: "openai/gpt-oss-20B"
  LLM_LOCAL_ONLY: "true"
  # Protocol TLS (optional)
  MQTT_CA_CERT: ""
  MQTT_CERTFILE: ""
  MQTT_KEYFILE: ""
  OPCUA_CERTIFICATE: ""
  OPCUA_PRIVATE_KEY: ""
  MODBUS_TLS: "false"
  MODBUS_CA_CERT: ""

secrets:
  create: false
  existingSecret: data-stream-secrets
  data:
    TIMESCALE_PASSWORD: ""
    JWT_SECRET: ""
    LLM_API_KEY: ""

# ---------------------------------------------------------------------------
# Node placement
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Dependencies (install separately or use subcharts)
# ---------------------------------------------------------------------------
# timescaledb:
#   enabled: false
#   # Use TimescaleDB Helm chart: https://github.com/timescale/helm-charts
# redpanda:
#   enabled: false
#   # Use Redpanda Helm chart: https://github.com/redpanda-data/helm-charts
