# ---------------------------------------------------------------------------
# Ravan — Helm values
# ---------------------------------------------------------------------------
# Each service can be enabled/disabled independently. Dependencies
# (TimescaleDB, Kafka) are expected to be installed separately or via
# subcharts.
# ---------------------------------------------------------------------------

image:
  repository: ghcr.io/navid-moradimehr/ravan
  tag: 1.0.0-beta.1
  pullPolicy: IfNotPresent

fullnameOverride: ""
namespaceOverride: ""
nameOverride: ""

# ---------------------------------------------------------------------------
# Service toggles
# ---------------------------------------------------------------------------
apiService:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/navid-moradimehr/ravan-api"
    tag: ""
    pullPolicy: ""
  command: ["python", "-m", "uvicorn", "services.api_service.main:app", "--host", "0.0.0.0", "--port", "8020", "--no-access-log"]
  port: 8020
  targetPort: 8020
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

aiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/navid-moradimehr/ravan-ai-gateway"
    tag: ""
    pullPolicy: ""
  command: ["uvicorn", "services.ai_gateway.main:app", "--host", "0.0.0.0", "--port", "8080", "--no-access-log"]
  port: 8080
  targetPort: 8080
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

processor:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/navid-moradimehr/ravan-processor"
    tag: ""
    pullPolicy: ""
  command: ["python", "-m", "services.processor.runtime_processor"]
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

flinkJob:
  enabled: false
  replicaCount: 1
  image:
    repository: "ghcr.io/navid-moradimehr/ravan-flink-job"
    tag: ""
    pullPolicy: ""
  command: ["bash", "/opt/stream/flink-job-entrypoint.sh"]
  autoscaling:
    mode: operator
  capacity:
    parallelism: 1
    maxParallelism: 120
    taskmanagerSlots: 1
    taskmanagerReplicas: 1
  operator:
    enabled: false
    serviceAccount: ravan-flink
    image: "ghcr.io/navid-moradimehr/ravan-flink-job:1.0.0-beta.1"
    flinkVersion: v1_20
    jobManager:
      cpu: 1
      memory: "1024m"
    taskManager:
      cpu: 1
      memory: "1024m"
    autoscalerEnabled: false
    minParallelism: 1
    maxParallelism: 120
    targetUtilization: 0.7
    catchUpDuration: 10m
    metricsWindow: 15m
    stabilizationInterval: 5m
    checkpointDir: "s3://datastream-checkpoints/checkpoints/"
    savepointDir: "s3://datastream-checkpoints/savepoints/"
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi

edgeIngest:
  enabled: true
  replicaCount: 1
  image:
    repository: "ghcr.io/navid-moradimehr/ravan-edge-ingest"
    tag: ""
    pullPolicy: ""
  command: ["python", "-m", "services.edge_ingest.main"]
  port: 8090
  targetPort: 8090
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

# ---------------------------------------------------------------------------
# Auto-scaling (HPA) — enabled per service for prod profiles
# ---------------------------------------------------------------------------
autoScaling:
  apiService:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  aiGateway:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  processor:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  flinkJob:
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  edgeIngest:
    enabled: false
    minReplicas: 1
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# Shared environment (injected into all services via ConfigMap)
# ---------------------------------------------------------------------------
env:
  SITE_ID: "demo-site"
  SITE_NAME: "Demo Site"
  DEPLOYMENT_MODE: "single-site"
  REGION: "local-lab"
  NETWORK_ZONE: "zone-a"
  RUNTIME_MODE: "flink-production"
  KAFKA_BROKERS: "kafka:9092"
  TIMESCALE_HOST: "timescaledb"
  TIMESCALE_PORT: "5432"
  TIMESCALE_DB: "stream_engine"
  TIMESCALE_USER: "stream"
  API_SERVICE_PORT: "8020"
  AI_GATEWAY_PORT: "8080"
  EDGE_METRICS_PORT: "8090"
  HISTORIAN_AUTO_SETUP: "1"
  HISTORIAN_BACKEND: "timescaledb"
  DATASTREAM_BACKUP_DIR: "backups/demo-site"
  DATASTREAM_BACKUP_SCHEDULE: "daily"
  DATASTREAM_BACKUP_RETENTION_DAYS: "14"
  DATASTREAM_FEDERATION_ENABLED: "false"
  DATASTREAM_FEDERATION_EXPORT_MODE: "none"
  DATASTREAM_CENTRAL_ENDPOINT: ""
  LLM_PROVIDER: "openai_compat"
  LLM_ENDPOINT_URL: "http://host.docker.internal:1234/v1"
  LLM_MODEL_ID: "openai/gpt-oss-20B"
  LLM_LOCAL_ONLY: "true"
  FLINK_PARALLELISM: "1"
  FLINK_MAX_PARALLELISM: "120"
  FLINK_TASKMANAGER_SLOTS: "1"
  # Protocol TLS (optional)
  MQTT_CA_CERT: ""
  MQTT_CERTFILE: ""
  MQTT_KEYFILE: ""
  OPCUA_CERTIFICATE: ""
  OPCUA_PRIVATE_KEY: ""
  MODBUS_TLS: "false"
  MODBUS_CA_CERT: ""

secrets:
  create: false
  existingSecret: ravan-secrets
  data:
    TIMESCALE_PASSWORD: ""
    JWT_SECRET: ""
    LLM_API_KEY: ""

# ---------------------------------------------------------------------------
# Node placement
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Dependencies (install separately or use subcharts)
# ---------------------------------------------------------------------------
# timescaledb:
#   enabled: false
#   # Use TimescaleDB Helm chart: https://github.com/timescale/helm-charts
# kafka:
#   enabled: false
#   # Use Redpanda Helm chart: https://github.com/redpanda-data/helm-charts
