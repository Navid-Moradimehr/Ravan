{{- $fullname := include "data-stream.fullname" . -}}
{{- $name := include "data-stream.name" . -}}
{{- $runtimeMode := default "python-fallback" .Values.env.RUNTIME_MODE -}}

{{- /* API Service HPA */ -}}
{{- if and .Values.apiService.enabled .Values.autoScaling.apiService.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $fullname }}-api
  namespace: {{ include "data-stream.namespace" . }}
  labels:
    app: {{ $name }}
    component: api-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $fullname }}-api
  minReplicas: {{ .Values.autoScaling.apiService.minReplicas }}
  maxReplicas: {{ .Values.autoScaling.apiService.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoScaling.apiService.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoScaling.apiService.targetMemoryUtilizationPercentage }}
{{- end }}

