{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.existingSecret }}
  namespace: {{ include "data-stream.namespace" . }}
  labels:
    app: {{ include "data-stream.name" . }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- end }}
