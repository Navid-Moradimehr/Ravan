{{- /*
  Multi-service deployment template for the Data Stream platform.
  Creates a separate Deployment for each enabled service so they can be
  scaled, updated, and restarted independently.
*/ -}}
{{- $fullname := include "data-stream.fullname" . -}}
{{- $name := include "data-stream.name" . -}}
{{- $chart := include "data-stream.chart" . -}}
{{- $runtimeMode := default "python-fallback" .Values.env.RUNTIME_MODE -}}

{{- /* API Service */ -}}
{{- if .Values.apiService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-api
  namespace: {{ include "data-stream.namespace" . }}
  labels:
    app: {{ $name }}
    component: api-service
    chart: {{ $chart }}
spec:
  replicas: {{ .Values.apiService.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
      component: api-service
  template:
    metadata:
      labels:
        app: {{ $name }}
        component: api-service
    spec:
      containers:
        - name: api-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.apiService.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ $fullname }}-env
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
                optional: true
          resources:
            {{- toYaml .Values.apiService.resources | nindent 12 }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
{{- end }}

